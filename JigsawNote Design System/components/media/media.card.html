<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style> body { padding: 20px; } .cols { display: grid; grid-template-columns: auto 1fr; gap: 24px; align-items: start; } .slide { height: 240px; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 28px; color: var(--color-primary-foreground); } </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" data-presets="react">
const { Calendar, Carousel } = window.JigsawNoteDesignSystem_94fd87;
function Demo() {
  const slides = [
    <div className="slide" style={{background:"var(--color-primary)"}}>Capture</div>,
    <div className="slide" style={{background:"var(--color-secondary)",color:"var(--color-secondary-foreground)"}}>Connect</div>,
    <div className="slide" style={{background:"var(--color-success)",color:"var(--color-success-foreground)"}}>Complete</div>,
  ];
  return (
    <div className="cols">
      <Calendar defaultValue={new Date()} />
      <Carousel slides={slides} defaultIndex={0} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
