<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { padding: 20px; }
  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 12px; }
  .lbl { font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--text-subtle); width: 100%; margin: 4px 0 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" data-presets="react">
const { Button, ButtonGroup, Link } = window.JigsawNoteDesignSystem_94fd87;
const colors = ["default","primary","secondary","success","warning","danger"];
const variants = ["solid","flat","bordered","light","faded","shadow","ghost"];
function Demo() {
  return (
    <div>
      <div className="lbl">Colors · solid</div>
      <div className="row">{colors.map(c => <Button key={c} color={c}>{c}</Button>)}</div>
      <div className="lbl">Variants · primary</div>
      <div className="row">{variants.map(v => <Button key={v} color="primary" variant={v}>{v}</Button>)}</div>
      <div className="lbl">Sizes · states · group · link</div>
      <div className="row">
        <Button size="sm" color="primary">sm</Button>
        <Button size="md" color="primary">md</Button>
        <Button size="lg" color="primary">lg</Button>
        <Button color="primary" isLoading>Saving</Button>
        <Button color="primary" isDisabled>Disabled</Button>
        <ButtonGroup>
          <Button color="primary" variant="flat">Day</Button>
          <Button color="primary" variant="flat">Week</Button>
          <Button color="primary" variant="flat">Month</Button>
        </ButtonGroup>
        <Link href="#" underline="always">Learn more</Link>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
