<!-- @dsCard group="Type" viewport="700x180" name="Display — Onest" subtitle="Brand headings, tight tracking" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 20px; font-family: var(--font-display); }
  .line { display: flex; align-items: baseline; gap: 14px; margin-bottom: 6px; }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--text-subtle); width: 70px; flex-shrink: 0; }
  .d1 { font-size: var(--display-lg); font-weight: 700; letter-spacing: var(--tracking-tight); line-height: 1.05; }
  .d2 { font-size: var(--display-md); font-weight: 600; letter-spacing: var(--tracking-tight); }
  .d3 { font-size: var(--display-xs); font-weight: 600; }
</style></head>
<body>
  <div class="line"><span class="tag">display-lg</span><span class="d1">Connect every note</span></div>
  <div class="line"><span class="tag">display-md</span><span class="d2">Think in pieces</span></div>
  <div class="line"><span class="tag">display-xs</span><span class="d3">Your second brain, organised</span></div>
</body></html>
