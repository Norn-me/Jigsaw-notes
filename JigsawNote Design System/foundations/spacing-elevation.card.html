<!-- @dsCard group="Spacing" viewport="700x160" name="Elevation" subtitle="Dark shadows + primary glow" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 24px; }
  .row { display: flex; gap: 26px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 110px; height: 60px; border-radius: var(--radius-large); background: var(--color-content1); border: 1px solid var(--color-divider); }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
</style></head>
<body>
<div class="row">
  <div class="cell"><div class="box" style="box-shadow:var(--shadow-small)"></div><span class="lbl">small</span></div>
  <div class="cell"><div class="box" style="box-shadow:var(--shadow-medium)"></div><span class="lbl">medium</span></div>
  <div class="cell"><div class="box" style="box-shadow:var(--shadow-large)"></div><span class="lbl">large</span></div>
  <div class="cell"><div class="box" style="box-shadow:var(--shadow-primary);border-color:var(--color-primary)"></div><span class="lbl">primary glow</span></div>
</div>
</body></html>
