<!-- @dsCard group="Colors" viewport="700x150" name="Brand palette" subtitle="The six core JigsawNote colors" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 18px; }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .sw { border-radius: var(--radius-medium); border: 1px solid var(--color-divider); overflow: hidden; }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
  .meta b { display: block; font-family: var(--font-sans); font-size: 12px; color: var(--color-foreground); font-weight: 600; margin-bottom: 2px; }
</style></head>
<body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#4cd36f"></div><div class="meta"><b>Accent</b>#4cd36f</div></div>
  <div class="sw"><div class="chip" style="background:#fc8747"></div><div class="meta"><b>Highlight</b>#fc8747</div></div>
  <div class="sw"><div class="chip" style="background:#161e17"></div><div class="meta"><b>Background</b>#161e17</div></div>
  <div class="sw"><div class="chip" style="background:#111911"></div><div class="meta"><b>Sidebar</b>#111911</div></div>
  <div class="sw"><div class="chip" style="background:#d4ddd7"></div><div class="meta"><b>Text</b>#d4ddd7</div></div>
  <div class="sw"><div class="chip" style="background:#3d5242"></div><div class="meta"><b>Border</b>#3d5242</div></div>
</div>
</body></html>
